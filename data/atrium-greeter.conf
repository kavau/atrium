# /etc/atrium-greeter.conf — atrium greeter configuration
# Lines starting with '#' are comments.  Unknown keys are ignored with a
# warning in the journal.

# Seconds of greeter idle time before blanking the screen.  The screen is
# blanked visually but the display is not powered off (no DPMS).  Set to 0
# to disable.
blank-timeout = 300

# Cursor theme and size.  Adwaita is available on all systems with GTK4.
# Due to how cage scales cursor sprites, larger values produce a visually
# smaller cursor — 36 is a normal desktop size.
cursor-theme = Adwaita
cursor-size = 36

# Base font size in pixels.  All text in the greeter is derived from this:
# heading = base * 3/2, user buttons = base * 6/5, other text = base.
# Increase for HiDPI displays.
base-font-size = 20
